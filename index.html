<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Media Unlock Check</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Helvetica,Arial,sans-serif;background:#0b0d12;color:#eef2f7;margin:0;padding:20px}
    .wrap{max-width:860px;margin:0 auto}
    .card{background:#141824;border:1px solid #293042;border-radius:16px;padding:18px 18px 14px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
    h1{margin:0 0 10px;font-size:24px}
    p{color:#a8b0c0;line-height:1.6}
    .bar{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 18px}
    button{background:#4f7cff;color:#fff;border:0;border-radius:12px;padding:12px 16px;font-size:15px;font-weight:600}
    button.secondary{background:#222838}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    .item{background:#0f1320;border:1px solid #22283a;border-radius:14px;padding:14px}
    .name{font-weight:700;font-size:16px}
    .status{margin-top:6px;font-size:15px;white-space:pre-wrap}
    .muted{color:#9aa4b2}
    .ok{color:#5dd39e}.warn{color:#ffd166}.bad{color:#ff6b6b}.dim{color:#8b93a7}
    code{background:#0b0d12;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>📺 流媒体 / AI 服务检测页</h1>
    <p>先在 iPhone 上切好 Shadowrocket 节点，再点 <b>开始检测</b>。结果反映的是你当前节点出口能力。</p>
    <p class="muted">后端接口：<span id="backend"></span></p>
    <div class="bar">
      <button id="runBtn">开始检测</button>
      <button class="secondary" id="copyBtn">复制接口地址</button>
    </div>
    <div id="summary" class="muted">等待检测…</div>
  </div>
  <div style="height:14px"></div>
  <div class="grid" id="results"></div>
</div>
<script>
const DEFAULT_API = 'https://media-unlock-check.amdceo.workers.dev/check';
const params = new URLSearchParams(location.search);
const api = params.get('api') || DEFAULT_API;
document.getElementById('backend').textContent = api;
const order = ['YouTube Premium','Netflix','Disney+','DAZN','Paramount+','Discovery+','ChatGPT'];
const mapClass = s => s==='available' ? 'ok' : s==='partial' || s==='coming' ? 'warn' : s==='not_available' || s==='error' || s==='timeout' ? 'bad' : 'dim';
function render(data){
  const results = document.getElementById('results');
  results.innerHTML = '';
  const items = (data && data.items) || {};
  order.forEach(name => {
    const item = items[name] || {text: name + ': 未返回结果', status:'unknown'};
    const div = document.createElement('div');
    div.className='item';
    div.innerHTML = `<div class="name">${name}</div><div class="status ${mapClass(item.status)}">${item.text}</div>`;
    results.appendChild(div);
  });
  document.getElementById('summary').textContent = data && data.generatedAt ? `检测完成：${data.generatedAt}` : '检测完成';
}
async function run(){
  document.getElementById('summary').textContent = '检测中，请稍等…';
  try{
    const r = await fetch(api, {method:'GET', headers:{'accept':'application/json'}});
    const j = await r.json();
    render(j);
  }catch(err){
    document.getElementById('summary').textContent = '检测失败：' + err;
  }
}
document.getElementById('runBtn').onclick = run;
document.getElementById('copyBtn').onclick = async()=>{
  try{ await navigator.clipboard.writeText(api); alert('已复制'); }catch(e){ alert(api); }
};
</script>
</body>
</html>
