<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>节点解锁检测</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;background:#0a0e17;color:#e4e8f1;min-height:100vh;padding:16px}
    .wrap{max-width:520px;margin:0 auto}
    .header{text-align:center;padding:24px 0 8px}
    .header h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
    .header p{color:#7a8494;font-size:13px;margin-top:6px;line-height:1.5}
    .ip-card{background:linear-gradient(135deg,#151b2e 0%,#1a2240 100%);border:1px solid #252d45;border-radius:16px;padding:20px;margin:16px 0;position:relative;overflow:hidden}
    .ip-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(79,124,255,.12) 0%,transparent 70%);border-radius:50%}
    .ip-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;font-weight:600}
    .ip-value{font-size:26px;font-weight:700;margin:6px 0;font-variant-numeric:tabular-nums;word-break:break-all}
    .ip-geo{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .ip-tag{background:#1e2642;border:1px solid #2a3458;border-radius:8px;padding:4px 10px;font-size:12px;color:#9aa4b8}
    .ip-tag .val{color:#e4e8f1;font-weight:600}
    .ip-tag.dc{border-color:#6b3a3a;background:#2a1a1e;color:#f0a0a0}
    .ip-tag.res{border-color:#2a5a3a;background:#1a2a1e;color:#80d0a0}
    .action{text-align:center;margin:16px 0}
    .btn{display:inline-flex;align-items:center;gap:8px;background:#4f7cff;color:#fff;border:0;border-radius:14px;padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
    .btn:active{transform:scale(.97);opacity:.9}
    .btn:disabled{opacity:.5;cursor:default;transform:none}
    .btn svg{width:18px;height:18px;fill:currentColor}
    .timer{color:#6b7280;font-size:12px;margin-top:8px}
    .section-title{font-size:13px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;margin:20px 0 10px;padding-left:4px}
    .results{display:flex;flex-direction:column;gap:10px}
    .item{background:#12172a;border:1px solid #1e2642;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
    .item.ok{border-color:#2a5a3a} .item.warn{border-color:#5a4a2a} .item.bad{border-color:#5a2a2a}
    .item .icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:#1a2040}
    .item.ok .icon{background:#1a2a1e} .item.warn .icon{background:#2a2618} .item.bad .icon{background:#2a1a1e}
    .item .info{flex:1;min-width:0}
    .item .name{font-size:14px;font-weight:600}
    .item .detail{font-size:12px;margin-top:2px;color:#7a8494;line-height:1.4}
    .item .badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0}
    .item.ok .badge{background:#1a2e1e;color:#5dd39e}
    .item.warn .badge{background:#2e2a1a;color:#ffd166}
    .item.bad .badge{background:#2e1a1a;color:#ff6b6b}
    .item.loading .badge{background:#1a2040;color:#6b7280}
    .footer{text-align:center;padding:24px 0;color:#4a5268;font-size:11px;line-height:1.6}
    .ip-hidden{display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .ip-loading-text{color:#6b7280;font-size:14px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🌐 节点解锁检测</h1>
    <p>检测当前代理节点的出口 IP 和流媒体可达性。<br>所有请求由浏览器直接发出，走你当前的代理线路。</p>
  </div>

  <div class="ip-card" id="ipCard">
    <div class="ip-label">当前出口 IP</div>
    <div class="ip-value" id="ipAddr"><span class="ip-loading-text">获取中…</span></div>
    <div class="ip-geo" id="ipGeo"></div>
  </div>

  <div class="action">
    <button class="btn" id="runBtn" onclick="runAll()">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      开始检测
    </button>
    <div class="timer" id="timer"></div>
  </div>

  <div class="section-title ip-hidden" id="resultsTitle">流媒体 & AI 服务</div>
  <div class="results" id="results"></div>

  <div class="footer">
    纯前端检测 · 无后端 · 所有请求走你的代理出口<br>
    <span style="color:#5a6278">受浏览器跨域限制，Netflix / Disney+ 等只能检测可达性</span>
  </div>
</div>

<script>
const TIMEOUT = 6000;
const SERVICES = [
  { key:'chatgpt',  name:'ChatGPT',          icon:'🤖', test:testChatGPT },
  { key:'youtube',  name:'YouTube',           icon:'▶️', test:testYouTube },
  { key:'netflix',  name:'Netflix',           icon:'🎬', test:testNetflix },
  { key:'disney',   name:'Disney+',           icon:'🏰', test:testDisney },
  { key:'spotify',  name:'Spotify',           icon:'🎵', test:testSpotify },
  { key:'tiktok',   name:'TikTok',            icon:'🎵', test:testTikTok },
  { key:'dazn',     name:'DAZN',              icon:'⚽', test:testDAZN },
  { key:'paramount',name:'Paramount+',        icon:'⛰️', test:testParamount },
];

const FLAGS = {'AE':'🇦🇪','AR':'🇦🇷','AU':'🇦🇺','BR':'🇧🇷','CA':'🇨🇦','CH':'🇨🇭','CN':'🇨🇳','DE':'🇩🇪','DK':'🇩🇰','ES':'🇪🇸','FI':'🇫🇮','FR':'🇫🇷','GB':'🇬🇧','HK':'🇭🇰','ID':'🇮🇩','IE':'🇮🇪','IN':'🇮🇳','IT':'🇮🇹','JP':'🇯🇵','KR':'🇰🇷','MX':'🇲🇽','MY':'🇲🇾','NL':'🇳🇱','NO':'🇳🇴','NZ':'🇳🇿','PH':'🇵🇭','PL':'🇵🇱','PT':'🇵🇹','RU':'🇷🇺','SA':'🇸🇦','SE':'🇸🇪','SG':'🇸🇬','TH':'🇹🇭','TR':'🇹🇷','TW':'🇹🇼','UA':'🇺🇦','US':'🇺🇸','VN':'🇻🇳','ZA':'🇿🇦'};
function flag(cc){ return cc?(FLAGS[cc.toUpperCase()]||'🏳️'):''; }

// ── Helpers ──────────────────────────
async function fetchWithTimeout(url, opts={}, ms=TIMEOUT){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), ms);
  try{
    const r = await fetch(url, {...opts, signal:ctrl.signal, cache:'no-store'});
    const t = await r.text();
    return {ok:true, status:r.status, body:t};
  }catch(e){
    return {ok:false, error:String(e)};
  }finally{ clearTimeout(timer); }
}

async function probeReachable(url, ms=TIMEOUT){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), ms);
  try{
    await fetch(url, {mode:'no-cors', signal:ctrl.signal, cache:'no-store'});
    return true;
  }catch{
    return false;
  }finally{ clearTimeout(timer); }
}

async function imgProbe(url, ms=TIMEOUT){
  return new Promise(resolve=>{
    const img = new Image();
    const t = setTimeout(()=>{img.src='';resolve(false);}, ms);
    img.onload=()=>{clearTimeout(t);resolve(true);};
    img.onerror=()=>{clearTimeout(t);resolve(false);};
    img.src = url;
  });
}

// ── IP (auto on page load) ──────────
async function detectIP(){
  const ipEl = document.getElementById('ipAddr');
  const geoEl = document.getElementById('ipGeo');
  try{
    const r = await fetchWithTimeout('http://ip-api.com/json/?fields=status,query,country,countryCode,regionName,city,isp,as,hosting&lang=zh-CN',{},8000);
    if(!r.ok) throw 0;
    const d = JSON.parse(r.body);
    if(d.status!=='success') throw 0;
    ipEl.textContent = d.query;
    let tags=[];
    tags.push(`<span class="ip-tag">${flag(d.countryCode)} <span class="val">${d.country}</span></span>`);
    if(d.city) tags.push(`<span class="ip-tag">📍 <span class="val">${d.city}</span></span>`);
    if(d.isp) tags.push(`<span class="ip-tag">🏢 <span class="val">${d.isp}</span></span>`);
    if(d.as) tags.push(`<span class="ip-tag">🔗 <span class="val">${d.as.split(' ')[0]}</span></span>`);
    if(d.hosting===true) tags.push(`<span class="ip-tag dc">⚠️ 机房 IP</span>`);
    else if(d.hosting===false) tags.push(`<span class="ip-tag res">✅ 住宅 IP</span>`);
    geoEl.innerHTML = tags.join('');
  }catch{
    try{
      const r2 = await fetchWithTimeout('https://1.1.1.1/cdn-cgi/trace',{},6000);
      if(!r2.ok) throw 0;
      const ip=(r2.body.match(/ip=(.+)/)||[])[1]||'';
      const loc=(r2.body.match(/loc=([A-Z]{2})/)||[])[1]||'';
      ipEl.textContent = ip||'未知';
      geoEl.innerHTML = loc?`<span class="ip-tag">${flag(loc)} <span class="val">${loc}</span></span>`:'';
    }catch{
      ipEl.textContent = '检测失败';
    }
  }
}

// ── Tests ────────────────────────────
async function testChatGPT(){
  const res = await fetchWithTimeout('https://chatgpt.com/cdn-cgi/trace');
  if(!res.ok) return {status:'bad', badge:'不可达', detail:'无法连接'};
  const loc=(res.body.match(/loc=([A-Z]{2})/)||[])[1]||'';
  const blocked=new Set(['CN','RU','KP','IR','CU','SY','BY']);
  if(blocked.has(loc)) return {status:'bad', badge:'不可用', detail:`${flag(loc)} ${loc} 在封禁名单内`};
  if(loc) return {status:'ok', badge:'可用', detail:`出口地区 ${flag(loc)} ${loc}`};
  return {status:'warn', badge:'可达', detail:'已连通，未检测到地区'};
}

async function testYouTube(){
  if(!await probeReachable('https://www.youtube.com/')) return {status:'bad', badge:'不可达', detail:'无法连接'};
  return {status:'ok', badge:'可达', detail:'YouTube 可正常访问（Premium 需登录确认）'};
}

async function testNetflix(){
  // Try direct fetch first (CORS will likely block, but try)
  const res = await fetchWithTimeout('https://www.netflix.com/title/81280792');
  if(res.ok){
    if(res.status===200) return {status:'ok', badge:'解锁', detail:'非自制内容可访问'};
    if(res.status===404) return {status:'warn', badge:'仅自制', detail:'仅自制剧集可访问'};
    if(res.status===403) return {status:'bad', badge:'封锁', detail:'IP 被 Netflix 封锁'};
    return {status:'warn', badge:`HTTP ${res.status}`, detail:'响应异常'};
  }
  // CORS blocked → fallback to reachability
  if(!await probeReachable('https://www.netflix.com/')) return {status:'bad', badge:'不可达', detail:'无法连接 Netflix'};
  const cdn = await imgProbe('https://assets.nflxext.com/us/ffe/siteui/common/icons/nficon2023.ico');
  if(cdn) return {status:'warn', badge:'可达', detail:'可连通，解锁状态需打开 Netflix 确认'};
  return {status:'warn', badge:'部分可达', detail:'域名可通，CDN 资源异常'};
}

async function testDisney(){
  // Try BAMGrid API (CORS will likely block from our origin)
  try{
    const res = await fetchWithTimeout('https://disney.api.edge.bamgrid.com/devices',{
      method:'POST',
      headers:{'content-type':'application/json; charset=UTF-8','authorization':'Bearer ZGlzbmV5JmJyb3dzZXImMS4wLjA.Cu56AgSfBTDag5NiRA81oLHkDZfu5L3CKadnefEAY84'},
      body:JSON.stringify({deviceFamily:'browser',applicationRuntime:'chrome',deviceProfile:'windows',attributes:{}})
    });
    if(res.ok){
      if(res.status===403) return {status:'bad', badge:'封锁', detail:'IP 被 Disney+ 封锁'};
      try{
        const j=JSON.parse(res.body);
        if(j.assertion) return {status:'ok', badge:'解锁', detail:'Disney+ API 验证通过'};
      }catch{}
    }
  }catch{}
  // Fallback
  if(!await probeReachable('https://www.disneyplus.com/')) return {status:'bad', badge:'不可达', detail:'无法连接 Disney+'};
  const cdn = await imgProbe('https://cnbl-cdn.bamgrid.com/assets/7ecc8bcb-60ee-4b56-b105-fe28891a2c2b/original');
  if(cdn) return {status:'warn', badge:'可达', detail:'可连通，解锁状态需打开 Disney+ 确认'};
  return {status:'warn', badge:'部分可达', detail:'域名可通，CDN 资源异常'};
}

async function testSpotify(){
  if(!await probeReachable('https://www.spotify.com/')) return {status:'bad', badge:'不可达', detail:'无法连接'};
  return {status:'ok', badge:'可达', detail:'Spotify 可正常访问'};
}

async function testTikTok(){
  if(!await probeReachable('https://www.tiktok.com/')) return {status:'bad', badge:'不可达', detail:'无法连接'};
  return {status:'ok', badge:'可达', detail:'TikTok 可正常访问'};
}

async function testDAZN(){
  if(!await probeReachable('https://www.dazn.com/')) return {status:'bad', badge:'不可达', detail:'无法连接'};
  return {status:'ok', badge:'可达', detail:'DAZN 可正常访问'};
}

async function testParamount(){
  if(!await probeReachable('https://www.paramountplus.com/')) return {status:'bad', badge:'不可达', detail:'无法连接'};
  return {status:'ok', badge:'可达', detail:'Paramount+ 可正常访问'};
}

// ── Render ───────────────────────────
const resultsEl = document.getElementById('results');
function renderResult(key, result){
  const el=document.getElementById('item-'+key);
  if(!el) return;
  el.className='item '+(result.status==='ok'?'ok':result.status==='warn'?'warn':result.status==='bad'?'bad':'');
  el.querySelector('.badge').textContent=result.badge;
  el.querySelector('.detail').textContent=result.detail;
}

// ── Main ─────────────────────────────
let running = false;
async function runAll(){
  if(running) return;
  running=true;
  const btn=document.getElementById('runBtn');
  const timerEl=document.getElementById('timer');
  btn.disabled=true;
  btn.innerHTML='<svg viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path d="M12 2a10 10 0 0 0 0 20 10 10 0 0 0 0-20zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z" opacity=".3"/><path d="M12 2a10 10 0 0 1 10 10h-2a8 8 0 0 0-8-8V2z"/></svg> 检测中…';
  const t0=Date.now();
  const tick=setInterval(()=>{timerEl.textContent=((Date.now()-t0)/1000).toFixed(1)+'s';},100);

  // Show results
  document.getElementById('resultsTitle').classList.remove('ip-hidden');
  resultsEl.innerHTML=SERVICES.map(s=>
    `<div class="item loading" id="item-${s.key}">
      <div class="icon">${s.icon}</div>
      <div class="info"><div class="name">${s.name}</div><div class="detail">检测中…</div></div>
      <div class="badge">…</div>
    </div>`).join('');

  // Run all service tests in parallel (IP already loaded)
  await Promise.all(SERVICES.map(async s=>{
    try{ renderResult(s.key, await s.test()); }
    catch(e){ renderResult(s.key, {status:'bad',badge:'异常',detail:String(e)}); }
  }));

  clearInterval(tick);
  timerEl.textContent=`完成，耗时 ${((Date.now()-t0)/1000).toFixed(1)}s`;
  btn.disabled=false;
  btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4a8 8 0 1 0 8 8h-2a6 6 0 1 1-1.76-4.24l-2.74 2.74H20V4l-2.35 2.35z"/></svg> 重新检测';
  running=false;
}

// Auto-detect IP on page load
detectIP();
</script>
</body>
</html>
